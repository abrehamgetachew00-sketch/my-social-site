<!DOCTYPE html>
<html>
<head>
  <title>Top TikTokers Voting</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🔥 Top TikTokers Voting</h1>
  <p>You have 1 FREE vote. Extra votes require payment (demo only).</p>

  <div class="card-container">

    <div class="card">
      <h3>👤 TikToker 1</h3>
      <p>Funny videos & trends</p>
      <button onclick="vote(this)">Vote</button>
      <p class="votes">0 votes</p>
    </div>

    <div class="card">
      <h3>👤 TikToker 2</h3>
      <p>Dance & entertainment</p>
      <button onclick="vote(this)">Vote</button>
      <p class="votes">0 votes</p>
    </div>

    <div class="card">
      <h3>👤 TikToker 3</h3>
      <p>Comedy & lifestyle</p>
      <button onclick="vote(this)">Vote</button>
      <p class="votes">0 votes</p>
    </div>

  </div>

  <script>
    let usedFreeVote = false;

    function vote(button) {
      let votesText = button.nextElementSibling;
      let count = parseInt(votesText.innerText);

      if (!usedFreeVote) {
        count++;
        votesText.innerText = count + " votes";
        usedFreeVote = true;
        alert("✅ You used your FREE vote!");
      } else {
        alert("❌ You already used your free vote.\nBuy more votes (not implemented yet).");
      }
    }
  </script>

</body>
</html>
